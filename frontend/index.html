<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/lifeline_themed_v1.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- SEO Meta Tags -->
  <title>Lifeline • Unified HMS Terminal</title>
  <meta name="description"
    content="Lifeline is an AI-powered, HIPAA-compliant hospital management platform with unified staff and patient terminals." />
  <meta name="keywords"
    content="hospital management, HMS, AI healthcare, medical software, patient management, doctor scheduling, HIPAA, Lifeline" />
  <meta name="author" content="Lifeline HMS" />

  <!-- Open Graph -->
  <meta property="og:title" content="Lifeline • HMS Portal" />
  <meta property="og:description"
    content="Unified, AI-powered hospital management portal for clinical staff and patient care." />
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://lifeline.health" />

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Outfit:wght@300;400;500;600;700;800;900&family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap"
    rel="stylesheet" />

  <!-- Theme color -->
  <meta name="theme-color" content="#061e3a" />

  <!-- Google Translate Integration -->
  <script type="text/javascript">
    function googleTranslateElementInit() {
      new google.translate.TranslateElement({
        pageLanguage: 'en',
        includedLanguages: 'hi,ta,te,ml,kn,bn,gu,mr,pa', // Indian languages
        layout: google.translate.TranslateElement.InlineLayout.SIMPLE,
        autoDisplay: false
      }, 'google_translate_element');

      // Monitor and kill any dynamic Google UI elements that ignore CSS
      const observer = new MutationObserver(() => {
        const banner = document.querySelector('.goog-te-banner-frame');
        if (banner) {
          banner.style.display = 'none';
          banner.style.visibility = 'hidden';
        }
        if (document.body.style.top !== '0px') {
          document.body.style.top = '0px';
        }
      });
      observer.observe(document.head, { attributes: true, childList: true, subtree: true });
      observer.observe(document.body, { attributes: true, childList: true, subtree: true });
    }
  </script>
  <script type="text/javascript" src="//translate.google.com/translate_a/element.js?cb=googleTranslateElementInit" async
    defer></script>
</head>

<body>
  <div id="root"></div>
  <script type="module" src="/src/main.jsx"></script>
</body>

</html>
