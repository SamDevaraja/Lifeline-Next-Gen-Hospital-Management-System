services:
  # Backend API (Django)
  - type: web
    name: lifeline-backend
    env: python
    buildCommand: "./build.sh"
    startCommand: "gunicorn hospitalmanagement.wsgi:application --bind 0.0.0.0:$PORT"
    envVars:
      - key: PYTHON_VERSION
        value: 3.10.0
      - key: DATABASE_URL
        fromDatabase:
          name: lifeline-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: FRONTEND_URL
        value: "https://lifeline-frontend.onrender.com"

  # Frontend (React)
  - type: web
    name: lifeline-frontend
    env: static
    buildCommand: "cd frontend && npm install && npm run build"
    staticPublishPath: "./frontend/dist"
    envVars:
      - key: VITE_API_URL
        value: "https://lifeline-backend.onrender.com"

databases:
  - name: lifeline-db
    databaseName: lifeline
    user: lifeline
    plan: free
